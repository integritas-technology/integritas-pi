name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous release tag
        id: prev-tag
        run: |
          # Exclude pre-release-shaped tags (e.g. v0.0.0-test.1) so a leftover
          # test tag from a dry run can never be picked as "previous release"
          # and hide real changes from the diff below.
          prev=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | grep -v -- '-' | head -n1)
          echo "tag=${prev}" >> "$GITHUB_OUTPUT"

      - name: Detect changed service folders since previous release
        id: filter
        run: |
          prev="${{ steps.prev-tag.outputs.tag }}"
          if [ -z "$prev" ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "backend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$prev" "${GITHUB_REF_NAME}")
          echo "frontend=$(echo "$changed" | grep -q '^frontend/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "backend=$(echo "$changed" | grep -q '^backend/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      frontend-digest: ${{ steps.frontend-ref.outputs.ref }}
      backend-digest: ${{ steps.backend-ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: needs.changes.outputs.frontend == 'true'
        id: frontend-build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/integritas-pi-frontend:${{ github.ref_name }}

      - name: Resolve frontend digest ref
        if: needs.changes.outputs.frontend == 'true'
        id: frontend-ref
        run: echo "ref=ghcr.io/${{ github.repository_owner }}/integritas-pi-frontend@${{ steps.frontend-build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        if: needs.changes.outputs.backend == 'true'
        id: backend-build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/integritas-pi-backend:${{ github.ref_name }}

      - name: Resolve backend digest ref
        if: needs.changes.outputs.backend == 'true'
        id: backend-ref
        run: echo "ref=ghcr.io/${{ github.repository_owner }}/integritas-pi-backend@${{ steps.backend-build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  manifest:
    needs: [changes, build]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build manifest
        env:
          FRONTEND_DIGEST: ${{ needs.build.outputs.frontend-digest }}
          BACKEND_DIGEST: ${{ needs.build.outputs.backend-digest }}
        run: node scripts/release/build-manifest.mjs manifest.source.json manifest.json

      - name: Sign manifest
        env:
          MANIFEST_SIGNING_KEY: ${{ secrets.MANIFEST_SIGNING_KEY }}
        run: node scripts/release/sign-manifest.mjs manifest.json manifest.json.sig

      # QA deploy: pushes to the private integritas-manifests repo, under
      # integritas-pi/qa/ (app-namespaced so other apps can reuse this repo
      # later without a restructure). The QA VPS pulls this repo on a cron
      # schedule and serves integritas-pi/qa/ via nginx.
      # See docs/plans/update-service-launch.md §1 for why this is pull-based
      # (push-over-SSH can't reach the VPS: its firewall only allows known
      # dev-team IPs, and GitHub-hosted runners have no stable IP to allowlist).
      # Switch to integritas-pi/prod/ once QA is verified end-to-end.
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/integritas-manifests
          ssh-key: ${{ secrets.MANIFEST_REPO_DEPLOY_KEY }}
          path: manifest-repo

      - name: Deploy manifest (push to private manifest repo)
        run: |
          cp manifest.json manifest.json.sig manifest-repo/integritas-pi/qa/
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add integritas-pi/qa/manifest.json integritas-pi/qa/manifest.json.sig
          git diff --staged --quiet && exit 0
          git commit -m "integritas-pi/qa: update manifest (${{ github.ref_name }})"
          git push

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: |
            manifest.json
            manifest.json.sig
