name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous release tag
        id: prev-tag
        run: |
          prev=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1)
          echo "tag=${prev}" >> "$GITHUB_OUTPUT"

      - name: Detect changed service folders since previous release
        id: filter
        run: |
          prev="${{ steps.prev-tag.outputs.tag }}"
          if [ -z "$prev" ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "backend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$prev" "${GITHUB_REF_NAME}")
          echo "frontend=$(echo "$changed" | grep -q '^frontend/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "backend=$(echo "$changed" | grep -q '^backend/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      frontend-digest: ${{ steps.frontend-ref.outputs.ref }}
      backend-digest: ${{ steps.backend-ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: needs.changes.outputs.frontend == 'true'
        id: frontend-build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/integritas-pi-frontend:${{ github.ref_name }}

      - name: Resolve frontend digest ref
        if: needs.changes.outputs.frontend == 'true'
        id: frontend-ref
        run: echo "ref=ghcr.io/${{ github.repository_owner }}/integritas-pi-frontend@${{ steps.frontend-build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        if: needs.changes.outputs.backend == 'true'
        id: backend-build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/integritas-pi-backend:${{ github.ref_name }}

      - name: Resolve backend digest ref
        if: needs.changes.outputs.backend == 'true'
        id: backend-ref
        run: echo "ref=ghcr.io/${{ github.repository_owner }}/integritas-pi-backend@${{ steps.backend-build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  manifest:
    needs: [changes, build]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build manifest
        env:
          FRONTEND_DIGEST: ${{ needs.build.outputs.frontend-digest }}
          BACKEND_DIGEST: ${{ needs.build.outputs.backend-digest }}
        run: node scripts/release/build-manifest.mjs manifest.source.json manifest.json

      - name: Sign manifest
        env:
          MANIFEST_SIGNING_KEY: ${{ secrets.MANIFEST_SIGNING_KEY }}
        run: node scripts/release/sign-manifest.mjs manifest.json manifest.json.sig

      # TODO (part 6): deploy manifest.json + manifest.json.sig to the VPS
      # Next.js app via the dedicated low-privilege deploy user. Placeholder
      # secrets referenced below don't exist yet.
      - name: Deploy manifest (placeholder)
        env:
          VPS_DEPLOY_HOST: ${{ secrets.VPS_DEPLOY_HOST }}
          VPS_DEPLOY_USER: ${{ secrets.VPS_DEPLOY_USER }}
          VPS_DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
        run: |
          echo "TODO (part 6): scp/rsync manifest.json + manifest.json.sig to $VPS_DEPLOY_HOST"

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: |
            manifest.json
            manifest.json.sig
